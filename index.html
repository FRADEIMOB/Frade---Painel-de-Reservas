<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Frade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:20px}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:10px}
</style>
</head>

<body>

<h2>PAINEL FRADE</h2>

<div class="card">
<input id="date" type="date">
<input id="client" placeholder="Cliente">
<input id="broker" placeholder="Corretor">
<input id="empreendimento" placeholder="Empreendimento">
<button onclick="salvarReserva()">Salvar</button>
</div>

<div class="card">
<h3>Reservas</h3>
<div id="lista"></div>
</div>

<script>
let reservas = [];

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  reservas.forEach(r=>{
    const div = document.createElement("div");
    div.innerHTML = `
      <b>${r.client}</b> - ${r.empreendimento}
      <button onclick="excluir('${r.id}')">❌</button>
    `;
    lista.appendChild(div);
  });
}

function limpar(){
  document.getElementById("client").value="";
  document.getElementById("broker").value="";
  document.getElementById("empreendimento").value="";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0vkONyYw0a78Gt-2463Utm6aMhWXjtaI",
  authDomain: "frade-painel-de-reservas.firebaseapp.com",
  projectId: "frade-painel-de-reservas",
  storageBucket: "frade-painel-de-reservas.appspot.com",
  messagingSenderId: "668249968325",
  appId: "1:668249968325:web:a722297f029fd78f92aac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 SALVAR
window.salvarReserva = async function(){
  const data = {
    date: document.getElementById("date").value,
    client: document.getElementById("client").value,
    broker: document.getElementById("broker").value,
    empreendimento: document.getElementById("empreendimento").value
  };

  if(!data.client) return alert("Preencha cliente");

  await addDoc(collection(db,"reservas"), data);
  limpar();
};

// 🔥 EXCLUIR
window.excluir = async function(id){
  await deleteDoc(doc(db,"reservas",id));
};

// 🔥 TEMPO REAL
onSnapshot(collection(db,"reservas"), snapshot=>{
  reservas = snapshot.docs.map(doc=>({
    id: doc.id,
    ...doc.data()
  }));
  render();
});
</script>

</body>
</html>
